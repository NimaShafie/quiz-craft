[OLLAMA_DETAILS]
# Model to use for quiz generation.
# Recommended: gemma3:4b (fast, good quality, ~3GB VRAM / RAM)
# Alternatives: qwen3.5:4b, llama3.2:3b
# Pull with: ollama pull gemma3:4b
model_name = gemma3:4b

# Ollama host — change to http://ollama:11434 when using Docker Compose
ollama_host = http://localhost:11434

# Device for embedding (only used if embeddings are enabled)
device = cpu

# Data directory (for file-based quiz generation)
data_directory = ./data
