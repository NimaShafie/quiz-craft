[OLLAMA_DETAILS]
# Model to use for quiz generation.
# Recommended: qwen3:4b (fast, good quality, ~3GB VRAM / RAM)
# Alternatives: gemma3:12b, llama3.1:8b
# Pull with: ollama pull qwen3:4b
model_name = qwen3:4b

# Ollama host — change to http://ollama:11434 when using Docker Compose
ollama_host = http://10.0.0.12:11434

# Device for embedding (only used if embeddings are enabled)
device = cpu

# Data directory (for file-based quiz generation)
data_directory = ./data
