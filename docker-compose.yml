# QuizCraft — Docker Compose
# Version 1 (self-hosted): docker compose --profile dev up
# Version 2 (hosted):      docker compose --profile hosted up

services:

  # ── Version 1: Self-hosted (personal use) ─────────────────────────────────
  quizcraft_v1:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizcraft_v1
    profiles: ["dev"]
    ports:
      - "8501:8501"
    environment:
      - OLLAMA_HOST=http://10.0.0.12:11434
      - OLLAMA_MODEL=qwen3:4b
    command: streamlit run src/quiz_craft.py --server.port=8501 --server.address=0.0.0.0
    restart: unless-stopped
    networks:
      - quizcraft_net

  # ── Version 2: Hosted (public, with rate limiting) ────────────────────────
  quizcraft_v2:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quizcraft_v2
    profiles:
      - hosted
    ports:
      - "8502:8502"
    environment:
      - OLLAMA_HOST=http://10.0.0.12:11434
      - OLLAMA_MODEL=qwen3:4b
      - HOSTED_MODE=true
    command: streamlit run src/quiz_craft.py --server.port=8502 --server.address=0.0.0.0
    restart: unless-stopped
    networks:
      - quizcraft_net

networks:
  quizcraft_net:
    driver: bridge
